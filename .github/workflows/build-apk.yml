name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release-apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10.2"
          cache-provider: basic

      - name: Build release APK
        run: |
          set +e
          gradle :app:assembleRelease --no-daemon --stacktrace --console=plain 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "### Build failed"
              echo
              echo "First useful error block:"
              echo
              echo '```'
              awk '
                /(^e: |^ERROR:|^FAILURE:|Execution failed|Could not |Type mismatch|Unresolved reference|No value passed|Cannot access|error:)/ {
                  if (!found) {
                    start = NR - 8
                    if (start < 1) start = 1
                    end = NR + 90
                    found = 1
                  }
                }
                { lines[NR] = $0 }
                END {
                  if (found) {
                    for (i = start; i <= end && i <= NR; i++) print lines[i]
                  } else {
                    start = NR - 120
                    if (start < 1) start = 1
                    for (i = start; i <= NR; i++) print lines[i]
                  }
                }
              ' build.log | head -140
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$status"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: water-record-light-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
